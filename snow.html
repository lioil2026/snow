<!DOCTYPE html>
<html>
<head>
    <style>
        * { margin: 0; padding: 0; }
        body {
            background: linear-gradient(145deg, #000000 0%, #000000 100%);
            min-height: 100vh;
            overflow-x: hidden;
            cursor: default;
        }
        canvas {
            position: fixed;
            top: 0;
            left: 0;
            pointer-events: auto;  /* 让 canvas 可以捕获鼠标事件 */
            z-index: 9999;
        }
    </style>
</head>
<body>
    <h1 style="color:white; text-align:center; padding-top:50px;">鼠标靠近雪花会躲开</h1>

    <script>
        (function() {
            const canvas = document.createElement('canvas');
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            document.body.appendChild(canvas);
            const ctx = canvas.getContext('2d');

            let snowflakes = [];
            const SNOW_COUNT = 150;        // 雪花数量
            const AVOID_RADIUS = 150;        // 鼠标避开半径（像素）
            const AVOID_FORCE = 1;         // 避开的位移强度

            let mouseX = null, mouseY = null;

            // 监听鼠标位置
            canvas.addEventListener('mousemove', (e) => {
                const rect = canvas.getBoundingClientRect();
                const scaleX = canvas.width / rect.width;
                const scaleY = canvas.height / rect.height;
                mouseX = (e.clientX - rect.left) * scaleX;
                mouseY = (e.clientY - rect.top) * scaleY;
            });
            canvas.addEventListener('mouseleave', () => {
                mouseX = null;
                mouseY = null;
            });

            class Snowflake {
                constructor() {
                    this.x = Math.random() * canvas.width;
                    this.y = Math.random() * canvas.height;
                    // 大小范围改为 6~18px（更小）
                    this.size = Math.random() * 12 + 6;
                    this.speedY = Math.random() * 1.2 + 0.4;
                    this.speedX = Math.random() * 0.6 - 0.3;
                    this.opacity = Math.random() * 0.7 + 0.3;
                }
                update() {
                    // 正常移动
                    this.y += this.speedY;
                    this.x += this.speedX;

                    // 鼠标避开逻辑
                    if (mouseX !== null && mouseY !== null) {
                        const dx = this.x - mouseX;
                        const dy = this.y - mouseY;
                        const distance = Math.hypot(dx, dy);
                        if (distance < AVOID_RADIUS) {
                            // 远离方向：从鼠标指向雪花的方向向量
                            const angle = Math.atan2(dy, dx);
                            const forceX = Math.cos(angle) * AVOID_FORCE;
                            const forceY = Math.sin(angle) * AVOID_FORCE;
                            this.x += forceX;
                            this.y += forceY;
                        }
                    }

                    // 边界重置（超出画布就回到顶部/侧边）
                    if (this.y > canvas.height + this.size) {
                        this.y = -this.size;
                        this.x = Math.random() * canvas.width;
                    }
                    if (this.x > canvas.width + this.size) {
                        this.x = -this.size;
                        this.y = Math.random() * canvas.height;
                    }
                    if (this.x < -this.size) {
                        this.x = canvas.width + this.size;
                        this.y = Math.random() * canvas.height;
                    }
                }
                draw() {
                    ctx.font = `${this.size}px "Segoe UI Emoji", "Apple Color Emoji", "Noto Color Emoji", sans-serif`;
                    ctx.fillStyle = `rgba(255, 255, 255, ${this.opacity})`; // 纯白色
                    ctx.textAlign = "center";
                    ctx.textBaseline = "middle";
                    ctx.fillText("❆", this.x, this.y);
                }
            }

            function initSnow() {
                snowflakes = [];
                for (let i = 0; i < SNOW_COUNT; i++) {
                    snowflakes.push(new Snowflake());
                }
            }

            function animate() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                for (let flake of snowflakes) {
                    flake.update();
                    flake.draw();
                }
                requestAnimationFrame(animate);
            }

            window.addEventListener('resize', () => {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
                initSnow();
            });

            initSnow();
            animate();
        })();
    </script>
</body>
</html>
